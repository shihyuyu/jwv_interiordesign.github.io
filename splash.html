<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九維室內設計 | JWV Design</title>
  <meta name="description" content="九維室內設計 - 以質感、輕奢華風格打造專屬空間。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f4ef;
      --surface: #ffffff;
      --surface-soft: #f3f0ec;
      --text: #2c2a29;
      --muted: #6f6a64;
      --accent: #6d302c;
      --accent-soft: rgba(109, 48, 44, 0.08);
      --border: rgba(44, 42, 41, 0.1);
      --shadow: 0 28px 80px rgba(44, 42, 41, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Noto Sans TC', sans-serif;
      background: radial-gradient(circle at top left, rgba(236, 216, 199, 0.35), transparent 30%),
                  linear-gradient(180deg, #faf7f2 0%, #f6f1eb 100%);
      color: var(--text);
      overflow: hidden;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .splash-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top left, rgba(236, 216, 199, 0.35), transparent 30%),
                  linear-gradient(180deg, #faf7f2 0%, #f6f1eb 100%);
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.8s ease-out;
    }

    .splash-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      text-align: center;
    }

    .splash-logo {
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: splash-logo-float 3s ease-in-out infinite;
    }

    .splash-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    @keyframes splash-logo-float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    .splash-brand {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .splash-brand-title {
      margin: 0;
      font-family: 'Noto Serif TC', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
      animation: splash-text-appear 1s ease-out 0.3s both;
    }

    .splash-brand-subtitle {
      margin: 0;
      font-size: 0.875rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
      animation: splash-text-appear 1s ease-out 0.5s both;
    }

    @keyframes splash-text-appear {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .splash-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      animation: splash-loader-appear 1s ease-out 0.7s both;
    }

    @keyframes splash-loader-appear {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .splash-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--accent);
      opacity: 0.4;
      animation: splash-dot-pulse 1.4s ease-in-out infinite;
    }

    .splash-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .splash-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes splash-dot-pulse {
      0%, 100% {
        opacity: 0.4;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.3);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .splash-logo {
        width: 80px;
        height: 80px;
      }

      .splash-brand-title {
        font-size: 1.5rem;
      }

      .splash-brand-subtitle {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="splash-overlay" id="splashOverlay">
    <div class="splash-container">
      <div class="splash-logo">
        <img src="./assets/logo.svg" alt="九維室內設計 logo">
      </div>
      <div class="splash-brand">
        <h1 class="splash-brand-title">九維室內設計</h1>
        <p class="splash-brand-subtitle">J W V D E S I G N</p>
      </div>
      <div class="splash-loader">
        <span class="splash-dot"></span>
        <span class="splash-dot"></span>
        <span class="splash-dot"></span>
      </div>
    </div>
  </div>

  <script>
    // 模擬頁面載入完成（實際應用中可根據具體需求調整時間）
    window.addEventListener('load', function () {
      // 延遲 2.5 秒後開始淡出
      setTimeout(function () {
        const splashOverlay = document.getElementById('splashOverlay');
        splashOverlay.classList.add('fade-out');
        
        // 淡出完成後重定向到主頁面
        setTimeout(function () {
          window.location.href = './index.html';
        }, 800);
      }, 2500);
    });

    // 如果頁面加載超過 8 秒仍未完成，自動關閉 splash
    setTimeout(function () {
      const splashOverlay = document.getElementById('splashOverlay');
      if (splashOverlay) {
        splashOverlay.classList.add('fade-out');
        setTimeout(function () {
          window.location.href = './index.html';
        }, 800);
      }
    }, 8000);
  </script>
</body>
</html>
